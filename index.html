        <title>Caption Manager</title>

            body {
                font-family: Arial;
                margin: 20px;
                background: #f5f5f5;
            }
            h2 {
                margin: 0 0 16px;
            }
            .gallery {
                display: grid;
                grid-template-columns: repeat(10, 1fr);
                gap: 10px;
            }
            .card img {
                width: 100%;
                aspect-ratio: 1;
                border-radius: 8px;
                cursor: pointer;
                object-fit: cover;
            }
            @media (max-width: 1200px) {
                .gallery {
                    grid-template-columns: repeat(5, 1fr);
                }
            }
            @media (max-width: 700px) {
                .gallery {
                    grid-template-columns: repeat(3, 1fr);
                }
            }
            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: #0008;
                align-items: center;
                justify-content: center;
            }
            .box {
                background: #fff;
                width: min(760px, 95vw);
                max-height: 85vh;
                display: flex;
                flex-direction: column;
                border-radius: 10px;
                overflow: hidden;
            }
            .head,
            .foot {
                padding: 12px;
                background: #222;
                color: #fff;
                display: flex;
                justify-content: space-between;
            }
            .body {
                padding: 12px;
                overflow: auto;
            }
            .row {
                display: flex;
                gap: 8px;
                border: 1px solid #ddd;
                padding: 8px;
                border-radius: 8px;
                margin-bottom: 8px;
            }
            .txt {
                flex: 1;
                cursor: pointer;
            }
            .used {
                text-decoration: line-through;
                color: #888;
            }
            button {
                cursor: pointer;
            }
        </style>
    </head>

            const g = document.getElementById("g"),
                m = document.getElementById("m"),
                b = document.getElementById("b"),
                t = document.getElementById("t");
            let cur = 0;
            galleryData.forEach((it, i) => {
                let d = document.createElement("div");
                d.className = "card";
                d.innerHTML = `<img src="${it.image}">`;
                d.onclick = () => openM(i);
                g.appendChild(d);
            });
            function caps() {
                return galleryData[cur].captions
                    .split(/\n/)
                    .map((s) => s.trim())
                    .filter(Boolean);
            }
            function openM(i) {
                cur = i;
                t.textContent = galleryData[i].title;
                document.getElementById("q").value = "";
                render();
                m.style.display = "flex";
            }
            function closeM() {
                m.style.display = "none";
            }
            m.onclick = (e) => {
                if (e.target === m) closeM();
            };
            function render() {
                b.innerHTML = "";
                let f = document.getElementById("q").value.toLowerCase();
                caps().forEach((c, i) => {
                    if (!c.toLowerCase().includes(f)) return;
                    let u = localStorage.getItem(cur + "-" + i);
                    let r = document.createElement("div");
                    r.className = "row";
                    r.innerHTML = `<div class="txt ${u ? "used" : ""}">${c}</div><button>Copy</button>`;
                    let tx = r.querySelector(".txt");
                    let cp = () =>
                        navigator.clipboard.writeText(c).then(() => {
                            tx.classList.add("used");
                            localStorage.setItem(cur + "-" + i, 1);
                        });
                    tx.onclick = cp;
                    r.querySelector("button").onclick = cp;
                    b.appendChild(r);
                });
            }
            function resetUsed() {
                caps().forEach((_, i) => localStorage.removeItem(cur + "-" + i));
                render();
            }
